name: Secret scan
on:
  push:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  gitleaks:
    name: Blocking tracked-history secret scan
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: 8.30.1
      GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install pinned Gitleaks CLI
        run: |
          curl --fail --location --silent --show-error --output gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum --check --strict
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
      - name: Scan complete Git history with redacted output
        run: ./gitleaks git --redact --verbose .
